swagger: "2.0"
info:
  version: "1.0.0"
  title: "E-Commerce API"
  description: "API for managing brands, products, and user cart"

host: "localhost:3000"
basePath: "/api"

schemes:
  - http

produces:
  - application/json

paths:
  /brands:
    get:
      summary: Brands
      description: Returns all sunglass brands.
      tags:
        - brands
      responses:
        200:
          description: An array of brands
          schema:
            type: array
            items:
              type: object
              required:
                - id
                - name
              properties:
                id:
                  type: string
                name:
                  type: string

  /brands/{id}/products:
    get:
      summary: Products
      description: Returns products that match the brand id.
      tags:
        - products
      parameters:
        - name: id
          in: path
          required: true
          type: string
          description: Brand id
      responses:
        200:
          description: An array of products
          schema:
            type: array
            items:
              type: object
              required:
                - id
                - categoryId
                - name
                - price
                - imageUrls
              properties:
                id:
                  type: string
                categoryId:
                  type: string
                name:
                  type: string
                description:
                  type: string
                price:
                  type: string
                imageUrls:
                  type: array
                  items:
                    type: string
        404:
          description: No products with matching brand id exist

  /products:
    get:
      summary: Products
      tags:
        - products
      responses:
        200:
          description: An array of products
          schema:
            type: array
            items:
              type: object
              required:
                - id
                - categoryId
                - name
                - price
                - imageUrls
              properties:
                id:
                  type: string
                categoryId:
                  type: string
                name:
                  type: string
                description:
                  type: string
                price:
                  type: string
                imageUrls:
                  type: array
                  items:
                    type: string
        404:
          description: No products available

  /login:
    post:
      summary: Login
      description: Verifies credentials and returns a JWT token.
      tags:
        - login
      parameters:
        - name: username
          in: query
          required: true
          type: string
        - name: password
          in: query
          required: true
          type: string
      responses:
        200:
          description: JWT token returned
          schema:
            type: object
            properties:
              token:
                type: string
        401:
          description: Invalid credentials

  /me/cart:
    get:
      summary: Get cart
      description: Returns the user's cart.
      tags:
        - cart
      parameters:
        - name: Authorization
          in: header
          required: true
          type: string
          description: Bearer token
      responses:
        200:
          description: User cart
          schema:
            type: array
            items:
              type: object
              required:
                - id
                - brandName
                - description
                - quantity
              properties:
                id:
                  type: string
                brandName:
                  type: string
                description:
                  type: string
                quantity:
                  type: integer
        401:
          description: No token provided

    post:
      summary: Add item to cart
      tags:
        - cart
      parameters:
        - name: Authorization
          in: header
          required: true
          type: string
        - name: product
          in: body
          required: true
          schema:
            type: object
            required:
              - id
            properties:
              id:
                type: string
      responses:
        200:
          description: Updated cart
          schema:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                brandName:
                  type: string
                description:
                  type: string
                quantity:
                  type: integer

  /me/cart/{productId}:
    delete:
      summary: Delete cart item
      description: Removes a product from the cart.
      tags:
        - cart
      parameters:
        - name: Authorization
          in: header
          required: true
          type: string
        - name: productId
          in: path
          required: true
          type: string
      responses:
        200:
          description: Updated cart
          schema:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                brandName:
                  type: string
                description:
                  type: string
                quantity:
                  type: integer
        404:
          description: Product not found
        401:
          description: Invalid or missing token
